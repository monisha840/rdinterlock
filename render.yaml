services:
  - type: web
    name: rdinterlock-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: rdinterlock-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: rdinterlock-db
    plan: free
